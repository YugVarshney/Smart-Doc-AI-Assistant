version: "3.8"

services:
  db:
    image: pgvector/pgvector:pg15
    container_name: smartdoc_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smartdoc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smartdoc_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    container_name: smartdoc_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/smartdoc
      - REDIS_URL=redis://redis:6379/0
      - LLM_BACKEND=openai
      - LLM_API_KEY=${OPENAI_API_KEY}
      - EMBEDDING_BACKEND=local
      - SECRET_KEY=supersecretkeychangeinproduction1234567890
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build: ./frontend
    container_name: smartdoc_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
